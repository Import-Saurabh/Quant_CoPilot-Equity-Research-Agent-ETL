# ─────────────────────────────────────────────────────────────────────────────
# Quant Copilot – docker compose stack
#
# Services
#   db       – MySQL 8.0
#   minio    – MinIO object storage (PDFs)
#   api      – FastAPI application
#   adminer  – optional DB GUI      (docker compose --profile tools up)
#   mc       – MinIO bucket init    (docker compose --profile tools up)
#
# Start:
#   docker compose up --build -d
#
# Start with Adminer + MinIO Console:
#   docker compose --profile tools up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:
  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    container_name: quant_airflow_init
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-quant_airflow_secret}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
      PYTHONPATH: /opt/airflow/project
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
    volumes:
      - airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags:ro
      - .:/opt/airflow/project:ro
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username $${AIRFLOW_ADMIN_USER:-admin}
      --password $${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Quant
      --lastname Admin
      --role Admin
      --email $${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true"
    networks:
      - quant_net

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    container_name: quant_airflow_webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-quant_airflow_secret}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
      PYTHONPATH: /opt/airflow/project
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
    ports:
      - "${AIRFLOW_HOST_PORT:-8081}:8080"
    volumes:
      - airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags:ro
      - .:/opt/airflow/project:ro
    command: webserver
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - quant_net

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    container_name: quant_airflow_scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-quant_airflow_secret}
      AIRFLOW_UID: ${AIRFLOW_UID:-50000}
      _PIP_ADDITIONAL_REQUIREMENTS: "-r /opt/airflow/project/requirements.txt"
      PYTHONPATH: /opt/airflow/project
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: "false"
    volumes:
      - airflow_home:/opt/airflow
      - ./dags:/opt/airflow/dags:ro
      - .:/opt/airflow/project:ro
    command: scheduler
    networks:
      - quant_net

  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quant_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${MYSQL_HOST_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql_schema_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/minio_init.sql:/docker-entrypoint-initdb.d/02_minio.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - quant_net

  # ── MinIO Object Storage ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: quant_minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}

    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API  – used by the Python SDK
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web UI  – open http://localhost:9001

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - quant_net

  # ── FastAPI App ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: quant_api
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      RELOAD: "false"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"

      # Database
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # MinIO — use container name "minio" as host since both are on quant_net
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE:     "false"

    ports:
      - "${API_HOST_PORT:-8000}:8000"

    volumes:
      - .:/app:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - quant_net

  # ── Adminer – optional DB GUI ────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: quant_adminer
    restart: unless-stopped
    profiles: [tools]

    depends_on:
      - db

    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"

    networks:
      - quant_net

# ── Persistent Volumes ──────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local

# ── Docker Network ───────────────────────────────────────────────────────────
  airflow_home:
    driver: local

networks:
  quant_net:
    driver: bridge
