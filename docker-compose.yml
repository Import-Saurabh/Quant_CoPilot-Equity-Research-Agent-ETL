# ─────────────────────────────────────────────────────────────────────────────
# Quant Copilot – docker compose stack
#
# Services
#   db       – MySQL 8.0
#   minio    – MinIO object storage (PDFs)
#   api      – FastAPI application
#   adminer  – optional DB GUI      (docker compose --profile tools up)
#   mc       – MinIO bucket init    (docker compose --profile tools up)
#
# Start:
#   docker compose up --build -d
#
# Start with Adminer + MinIO Console:
#   docker compose --profile tools up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quant_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${MYSQL_HOST_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql_schema_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/minio_init.sql:/docker-entrypoint-initdb.d/02_minio.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - quant_net

  # ── MinIO Object Storage ─────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: quant_minio
    restart: unless-stopped

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}

    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API  – used by the Python SDK
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web UI  – open http://localhost:9001

    volumes:
      - minio_data:/data

    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    networks:
      - quant_net

  # ── FastAPI App ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: quant_api
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

    environment:
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      RELOAD: "false"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"

      # Database
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      # MinIO — use container name "minio" as host since both are on quant_net
      MINIO_ENDPOINT:   minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE:     "false"

    ports:
      - "${API_HOST_PORT:-8000}:8000"

    volumes:
      - .:/app:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - quant_net

  # ── Adminer – optional DB GUI ────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: quant_adminer
    restart: unless-stopped
    profiles: [tools]

    depends_on:
      - db

    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"

    networks:
      - quant_net

# ── Persistent Volumes ──────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local

# ── Docker Network ───────────────────────────────────────────────────────────
networks:
  quant_net:
    driver: bridge