version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Quant Copilot – docker compose stack
#
# Services
#   api      – FastAPI application (your code)
#   db       – MySQL 8.0
#   adminer  – optional lightweight DB GUI  (profile: tools)
#
# Quick start
#   cp .env.example .env          # fill in real values
#   docker compose up --build -d
#
# Start with optional Adminer GUI
#   docker compose --profile tools up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quant_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"   # 3307 on host → avoids clash with local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql_schema_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - quant_net

  # ── FastAPI app ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: quant_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Server
      HOST:            "0.0.0.0"
      PORT:            "8000"
      RELOAD:          "false"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"

      # MySQL – overrides the hardcoded DB_CONFIG in mysql_pipeline.py
      MYSQL_HOST:      db
      MYSQL_PORT:      "3306"
      MYSQL_DATABASE:  ${MYSQL_DATABASE}
      MYSQL_USER:      ${MYSQL_USER}
      MYSQL_PASSWORD:  ${MYSQL_PASSWORD}
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      # Mount source for fast iteration in dev; remove for production
      - .:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - quant_net

  # ── Adminer (optional) ───────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: quant_adminer
    restart: unless-stopped
    profiles: ["tools"]          # only starts with: --profile tools
    depends_on:
      - db
    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"
    networks:
      - quant_net

# ── Shared resources ─────────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

networks:
  quant_net:
    driver: bridge