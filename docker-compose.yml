
# ─────────────────────────────────────────────────────────────────────────────
# Quant Copilot – docker compose stack
#
# Services
#   api      – FastAPI application
#   db       – MySQL 8.0
#   adminer  – optional DB GUI
#
# Start:
#   docker compose up --build -d
#
# Start with Adminer:
#   docker compose --profile tools up --build -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL ────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quant_db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

      # Uses DB_* variables from .env
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${MYSQL_HOST_PORT}:3306"

    volumes:
      - mysql_data:/var/lib/mysql

      # Auto-run schema on fresh DB creation
      - ./database/mysql_schema_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - quant_net

  # ── FastAPI App ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    container_name: quant_api
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      # Server
      HOST: "0.0.0.0"
      PORT: "8000"
      RELOAD: "false"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-*}"

      # Database connection
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    ports:
      - "${API_HOST_PORT:-8000}:8000"

    volumes:
      # Remove :ro if hot reload/write access needed
      - .:/app:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - quant_net

  # ── Adminer (Optional) ───────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: quant_adminer
    restart: unless-stopped

    profiles:
      - tools

    depends_on:
      - db

    ports:
      - "${ADMINER_HOST_PORT:-8080}:8080"

    networks:
      - quant_net

# ── Persistent Volumes ─────────────────────────────────────────────────────
volumes:
  mysql_data:
    driver: local

# ── Docker Network ─────────────────────────────────────────────────────────
networks:
  quant_net:
    driver: bridge

